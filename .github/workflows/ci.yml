name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: windows-latest
            name: Windows
          - os: macos-14
            name: macOS ARM64
            cmake_extra: ""
          - os: macos-14
            name: macOS x86_64 (cross)
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Static Qt6 (cached) ────────────────────────────────────────
      - name: Cache static Qt6
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/qt6-static
          key: qt6-static-6.7.3-${{ runner.os }}-${{ runner.arch }}

      - name: Install Qt6 build deps (Linux)
        if: runner.os == 'Linux' && steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libfontconfig1-dev libfreetype-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libxcb1-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-shm0-dev libxcb-sync-dev libxcb-util-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev libxkbcommon-dev \
            libxkbcommon-x11-dev ninja-build

      - name: Install Qt6 build deps (macOS)
        if: runner.os == 'macOS' && steps.cache-qt.outputs.cache-hit != 'true'
        run: brew install ninja

      - name: Build static Qt6 (Unix)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          git clone --depth 1 --branch v6.7.3 https://code.qt.io/qt/qt5.git qt6-src
          cd qt6-src && perl init-repository --module-subset=qtbase && cd ..
          mkdir qt6-build && cd qt6-build
          ../qt6-src/configure -static -release \
            -prefix "${{ github.workspace }}/qt6-static" \
            -no-pch -nomake examples -nomake tests -submodules qtbase -- -GNinja
          cmake --build . --parallel
          cmake --install .
        timeout-minutes: 45

      - name: Build static Qt6 (Windows)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          git clone --depth 1 --branch v6.7.3 https://code.qt.io/qt/qt5.git qt6-src
          cd qt6-src && perl init-repository --module-subset=qtbase && cd ..
          mkdir qt6-build && cd qt6-build
          call "${{ github.workspace }}\qt6-src\configure.bat" -static -release -prefix "${{ github.workspace }}\qt6-static" -no-pch -nomake examples -nomake tests -submodules qtbase
          cmake --build . --parallel --config Release
          cmake --install .
        timeout-minutes: 60

      - name: Install dependencies (Linux)

        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ github.workspace }}/qt6-static

      - name: Build
        run: cmake --build build --config Release --parallel
